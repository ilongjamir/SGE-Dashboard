<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGE Solar Ops</title>
<style>
  :root{
    --bg:#EEEDE7; --panel:#FFFFFF; --ink:#16211F; --muted:#6E7A76;
    --line:#E3E1D9; --line-2:#EFEEE8;
    --amber:#F2A516; --amber-d:#C07F07;
    --green:#1E8A53; --green-bg:#E5F2EA;
    --slate:#8A938F; --slate-bg:#ECEEEA;
    --doing-bg:#FCEFD3;
    --sidebar:#122019; --sidebar-ink:#E8EDE9; --sidebar-muted:#7E908A;
    --danger:#C0392B;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --r:10px; --r-s:7px;
    --sh:0 1px 2px rgba(20,33,31,.06),0 4px 14px rgba(20,33,31,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .eyebrow{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--sidebar-muted);font-weight:600}
  .app{display:flex;min-height:100vh}
  .side{width:212px;flex:0 0 212px;background:var(--sidebar);color:var(--sidebar-ink);
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{padding:20px 18px 16px}
  .brand .logo{display:flex;align-items:center;gap:9px}
  .sun{width:22px;height:22px;flex:0 0 22px}
  .brand h1{font-size:15px;margin:0;letter-spacing:-.01em;font-weight:700}
  .brand .sub{margin-top:3px;color:var(--sidebar-muted);font-size:11px;letter-spacing:.02em}
  nav{padding:8px;display:flex;flex-direction:column;gap:2px}
  nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    background:transparent;border:0;color:var(--sidebar-muted);padding:9px 11px;border-radius:8px;
    font-size:13.5px;font-weight:500;transition:.12s}
  nav button:hover{color:#fff;background:rgba(255,255,255,.05)}
  nav button.on{color:var(--sidebar);background:var(--amber);font-weight:600}
  nav button .ic{width:17px;height:17px;flex:0 0 17px;opacity:.85}
  nav button.on .ic{opacity:1}
  .side-foot{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,.07)}
  .sync-pill{display:flex;align-items:center;gap:7px;padding:5px 2px 8px}
  .sync-pill .sp-dot{width:6px;height:6px;border-radius:50%;background:var(--sidebar-muted);flex:0 0 6px;transition:.3s}
  .sync-pill .sp-lbl{font-size:11px;font-weight:600;color:var(--sidebar-muted);transition:.3s}
  .mode-pill{display:flex;align-items:center;gap:8px;width:100%;justify-content:space-between;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;
    padding:9px 11px;color:var(--sidebar-ink);font-size:12.5px;font-weight:600}
  .mode-pill .dot{width:8px;height:8px;border-radius:50%}
  .mode-edit .dot{background:var(--amber)} .mode-view .dot{background:var(--green)}
  .side-foot .util{display:flex;gap:6px;margin-top:8px}
  .side-foot .util button{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
    color:var(--sidebar-muted);border-radius:7px;padding:7px 4px;font-size:11px;font-weight:600}
  .side-foot .util button:hover{color:#fff}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 26px 6px}
  .topbar .h{display:flex;flex-direction:column;gap:2px}
  .topbar h2{margin:0;font-size:21px;letter-spacing:-.02em;font-weight:700}
  .topbar .today{font-size:12.5px;color:var(--muted);font-weight:500}
  .content{padding:14px 26px 40px;flex:1}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);
    border-radius:var(--r-s);padding:8px 13px;font-size:13px;font-weight:600;display:inline-flex;
    align-items:center;gap:7px;transition:.12s}
  .btn:hover{border-color:#cfccc1}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.primary:hover{background:#26342f}
  .btn.amber{background:var(--amber);border-color:var(--amber);color:#241a02}
  .btn.amber:hover{background:var(--amber-d);border-color:var(--amber-d)}
  .btn.sm{padding:5px 9px;font-size:12px}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
  .btn.ghost:hover{color:var(--ink);background:var(--line-2)}
  .row-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--sh)}
  .kpi .lab{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.02em;text-transform:uppercase}
  .kpi .num{font-size:30px;font-weight:700;letter-spacing:-.03em;margin-top:6px;line-height:1}
  .kpi .num small{font-size:14px;color:var(--muted);font-weight:600;letter-spacing:0}
  .kpi .foot{font-size:11.5px;color:var(--muted);margin-top:6px}
  .kpi .bar-accent{height:3px;border-radius:3px;margin-top:11px;background:var(--line-2);overflow:hidden}
  .kpi .bar-accent i{display:block;height:100%;background:var(--green)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
  .panel .ph{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line-2)}
  .panel .ph h3{margin:0;font-size:14px;font-weight:700;letter-spacing:-.01em}
  .panel .pb{padding:6px 16px 14px}
  .two-col{display:grid;grid-template-columns:1.15fr .85fr;gap:18px}
  .list-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-2)}
  .list-row:last-child{border-bottom:0}
  .list-row .when{font-size:12px;color:var(--muted);width:78px;flex:0 0 78px}
  .list-row .body{flex:1;min-width:0}
  .list-row .body .t{font-weight:600;font-size:13.5px}
  .list-row .body .s{font-size:12px;color:var(--muted);margin-top:1px}
  .empty{color:var(--muted);font-size:13px;padding:18px 2px;text-align:center}
  .empty b{color:var(--ink)}
  .badge{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .b-todo{background:var(--slate-bg);color:#566159}
  .b-doing{background:var(--doing-bg);color:#8a5b06}
  .b-done{background:var(--green-bg);color:#16613a}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--line-2);border:1px solid var(--line);
    border-radius:20px;padding:3px 9px 3px 4px;font-size:12px;font-weight:500;margin:2px 4px 2px 0}
  .chip .av{width:18px;height:18px;border-radius:50%;background:var(--ink);color:#fff;font-size:9px;font-weight:700;
    display:flex;align-items:center;justify-content:center}
  .chip .tm{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start}
  .col{background:#F4F3EE;border:1px solid var(--line);border-radius:var(--r);min-height:120px}
  .col.drag-over{outline:2px dashed var(--amber);outline-offset:-3px}
  .col-h{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px}
  .col-h .ttl{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px}
  .col-h .cnt{font-size:11px;color:var(--muted);font-weight:600;background:#fff;border:1px solid var(--line);border-radius:20px;padding:1px 8px}
  .col-h .swatch{width:10px;height:10px;border-radius:3px}
  .cards{padding:4px 10px 12px;display:flex;flex-direction:column;gap:9px}
  .card{background:#fff;border:1px solid var(--line);border-radius:9px;padding:11px 12px;box-shadow:0 1px 2px rgba(20,33,31,.05)}
  .card[draggable=true]{cursor:grab}
  .card.dragging{opacity:.45}
  .card .ct{font-weight:600;font-size:13.5px;display:flex;justify-content:space-between;gap:8px}
  .card .cmeta{display:flex;flex-wrap:wrap;gap:4px 10px;font-size:11.5px;color:var(--muted);margin-top:6px}
  .card .cmeta .kw{font-family:var(--mono);color:var(--ink);font-weight:600}
  .card .cbar{height:5px;border-radius:4px;background:var(--line-2);margin-top:9px;overflow:hidden;position:relative}
  .card .cbar i{display:block;height:100%}
  .seg{display:inline-flex;background:#E7E5DD;border-radius:8px;padding:3px;gap:2px}
  .seg button{border:0;background:transparent;padding:6px 14px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--muted)}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .gantt-wrap{overflow-x:auto;border-radius:var(--r)}
  .gantt{position:relative;min-width:640px}
  .g-head{display:flex;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:3}
  .g-left{width:200px;flex:0 0 200px;border-right:1px solid var(--line);padding:9px 14px;font-size:11px;
    color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .g-axis{position:relative;flex:1}
  .g-month{position:absolute;top:6px;font-size:11px;font-weight:700;color:var(--ink);padding-left:5px;border-left:1px solid var(--line)}
  .g-row{display:flex;border-bottom:1px solid var(--line-2);min-height:46px}
  .g-row:hover{background:#FAFAF6}
  .g-rl{width:200px;flex:0 0 200px;border-right:1px solid var(--line-2);padding:8px 14px;display:flex;flex-direction:column;justify-content:center}
  .g-rl .nm{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .g-rl .st{font-size:11px;color:var(--muted)}
  .g-track{position:relative;flex:1}
  .g-bar{position:absolute;top:13px;height:20px;border-radius:6px;display:flex;align-items:center;padding:0 8px;
    font-size:11px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;cursor:pointer}
  .g-pin{position:absolute;top:9px;width:9px;height:9px;border-radius:50%;border:2px solid #fff;
    transform:translateX(-50%);cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .g-today{position:absolute;top:0;bottom:0;width:2px;background:var(--amber);z-index:2}
  .g-today::after{content:"TODAY";position:absolute;top:2px;left:4px;font-size:8.5px;font-weight:800;color:var(--amber-d);letter-spacing:.08em}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-head .nav{display:flex;align-items:center;gap:8px}
  .cal-head .ttl{font-size:16px;font-weight:700;min-width:170px;text-align:center}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
  .cal-dow{font-size:10.5px;font-weight:700;color:var(--muted);text-align:center;letter-spacing:.06em;padding-bottom:2px}
  .cal-cell{background:var(--panel);border:1px solid var(--line);border-radius:9px;min-height:104px;padding:7px 8px;display:flex;flex-direction:column;gap:4px}
  .cal-cell.out{background:#F4F3EE;opacity:.6}
  .cal-cell.today{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
  .cal-cell .dn{font-size:12px;font-weight:700;color:var(--muted)}
  .cal-cell.today .dn{color:var(--amber-d)}
  .cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
  .cal-week .cal-cell{min-height:230px}
  .v-chip{font-size:11px;border-radius:6px;padding:3px 6px;cursor:pointer;border-left:3px solid;line-height:1.25;background:#F4F3EE}
  .v-chip .vt{font-family:var(--mono);font-size:10px;color:var(--muted)}
  .v-chip .vn{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sched-day{margin-bottom:12px}
  .sched-day .dh{display:flex;align-items:baseline;gap:10px;margin:0 0 8px}
  .sched-day .dh .dd{font-weight:700;font-size:14px}
  .sched-day .dh .dw{font-size:12px;color:var(--muted)}
  .sched-day .dh.is-today .dd{color:var(--amber-d)}
  .visit{display:flex;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
    padding:12px 14px;box-shadow:var(--sh);margin-bottom:9px}
  .visit .vtime{flex:0 0 92px;border-right:1px solid var(--line-2);padding-right:12px}
  .visit .vtime .rng{font-family:var(--mono);font-weight:700;font-size:14px;letter-spacing:-.02em}
  .visit .vtime .dur{font-size:11px;color:var(--muted);margin-top:2px}
  .visit .vmain{flex:1;min-width:0}
  .visit .vtop{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .visit .vproj{font-weight:700;font-size:14px}
  .visit .vsite{font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px}
  .visit .vppl{margin-top:9px}
  .visit .vact{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
  .work{font-size:13px;margin-top:10px;white-space:pre-wrap;line-height:1.5}
  .work .wl{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:3px}
  .rmk{font-size:12.5px;color:#7a5406;background:var(--doing-bg);border-radius:8px;padding:8px 10px;margin-top:9px}
  .done-badge{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#16613a;background:var(--green-bg);border-radius:20px;padding:3px 9px;margin-top:8px;display:inline-block}
  .repair-badge{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#7a1212;background:#fdecea;border-radius:20px;padding:3px 9px;margin-top:8px;display:inline-block}
  .b-repair{background:#fdecea;color:#7a1212}
  .rpt-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
  .rpt-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:14px}
  .rpt-cal-dow{font-size:10.5px;font-weight:700;color:var(--muted);text-align:center;letter-spacing:.06em;padding-bottom:2px}
  .rpt-day{background:var(--panel);border:1px solid var(--line);border-radius:9px;min-height:68px;padding:6px 7px;cursor:pointer;transition:.1s;position:relative;display:flex;flex-direction:column;gap:3px}
  .rpt-day:hover{border-color:#bbb;background:#FAFAF6}
  .rpt-day.out{background:#F4F3EE;opacity:.5;pointer-events:none}
  .rpt-day.today{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
  .rpt-day.selected{border-color:var(--ink);box-shadow:0 0 0 1.5px var(--ink)}
  .rpt-day .rdn{font-size:12px;font-weight:700;color:var(--muted)}
  .rpt-day.today .rdn{color:var(--amber-d)}
  .rpt-day.selected .rdn{color:var(--ink)}
  .rpt-dots{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
  .rpt-dot{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
  .rpt-count{font-size:10px;color:var(--muted);font-weight:600}
  .day-detail{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:16px 18px;margin-bottom:18px}
  .day-detail .ddh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
  .day-detail .ddh h3{margin:0;font-size:15px;font-weight:700}
  .day-detail .empty{color:var(--muted);font-size:13px;padding:10px 0}
  input[type=range]{width:100%;accent-color:var(--amber)}
  .proj-reports{border:1px solid var(--line-2);border-radius:8px;overflow:hidden;margin-top:2px}
  .pr-row{display:flex;gap:10px;align-items:center;padding:8px 10px;border-bottom:1px solid var(--line-2);cursor:pointer;font-size:12.5px}
  .pr-row:last-child{border-bottom:0}
  .pr-row:hover{background:var(--line-2)}
  .pr-row .pr-w{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pr-row .rpt-date{font-family:var(--mono);font-weight:700;color:var(--muted);flex:0 0 50px}
  .crew-pick{display:flex;flex-wrap:wrap;gap:9px 16px;margin-top:2px}
  .field .crew-pick label{display:inline-flex;align-items:center;gap:8px;margin:0;font-size:13px;font-weight:500;color:var(--ink);text-transform:none;letter-spacing:0;white-space:nowrap;cursor:pointer}
  .crew-pick input[type=checkbox]{width:16px;height:16px;flex:0 0 16px;margin:0;accent-color:var(--amber);cursor:pointer}
  .people-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;box-shadow:var(--sh);display:flex;gap:12px;align-items:center}
  .pcard .pav{width:42px;height:42px;flex:0 0 42px;border-radius:50%;background:var(--ink);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
  .pcard .pn{font-weight:700;font-size:14px}
  .pcard .pr{font-size:12px;color:var(--muted)}
  .pcard .pph{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:2px}
  .pcard .pedit{margin-left:auto}
  .scrim{position:fixed;inset:0;background:rgba(18,32,25,.42);display:none;align-items:flex-start;
    justify-content:center;padding:40px 16px;z-index:50;overflow-y:auto}
  .scrim.open{display:flex}
  .modal{background:var(--panel);border-radius:14px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal .mh{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--line-2)}
  .modal .mh h3{margin:0;font-size:16px;font-weight:700}
  .modal .mb{padding:16px 20px}
  .modal .mf{padding:14px 20px;border-top:1px solid var(--line-2);display:flex;justify-content:space-between;gap:10px;align-items:center}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);letter-spacing:.02em;text-transform:uppercase;margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:var(--r-s);padding:9px 11px;background:#fff;color:var(--ink)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--amber);outline-offset:-1px;border-color:var(--amber)}
  .field textarea{resize:vertical;min-height:58px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:9px}
  .x{background:transparent;border:0;font-size:22px;color:var(--muted);line-height:1;padding:0 4px}
  .x:hover{color:var(--ink)}
  .help{font-size:11.5px;color:var(--muted);margin-top:-7px;margin-bottom:13px}
  .assign-row{display:grid;grid-template-columns:1.4fr 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px}
  .assign-row .del{background:transparent;border:0;color:var(--danger);font-size:18px;padding:0 4px}
  .mode-toggle{display:flex;gap:8px;margin-bottom:14px}
  .mode-toggle button{flex:1;border:1px solid var(--line);background:#fff;border-radius:var(--r-s);padding:10px;font-size:12.5px;font-weight:600;color:var(--muted)}
  .mode-toggle button.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .read-only-tag{font-size:11px;color:var(--muted)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);
    color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:80;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .view-only [data-edit]{display:none !important}
  /* settings page */
  .settings-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);max-width:580px;margin-bottom:18px}
  .settings-card .sc-head{padding:14px 18px;border-bottom:1px solid var(--line-2);font-size:14px;font-weight:700}
  .settings-card .sc-body{padding:18px 18px 20px}
  .settings-card .sc-body p{margin:0 0 16px;color:var(--muted);font-size:13.5px;line-height:1.55}

<script>
"use strict";
/* ---------- storage ---------- */
const KEY="sge_solar_ops_v1";
const PINKEY="sge_solar_ops_pin";
const GHKEY="sge_gh_token";
const REPO="ilongjamir/SGE-Dashboard";
const BRANCH="main";
const DATA_PATH="data.json";

let state=load();

function load(){
  let s;
  try{const r=localStorage.getItem(KEY);if(r)s=JSON.parse(r);}catch(e){}
  if(!s)s=seed();
  return migrate(s);
}
function migrate(s){
  s.projects=s.projects||[];s.people=s.people||[];s.visits=s.visits||[];
  s.visits.forEach(v=>{
    if(v.completed===undefined)v.completed=false;
    if(v.workDone===undefined)v.workDone="";
    if(v.remarks===undefined)v.remarks="";
    if(!Array.isArray(v.assignments))v.assignments=[];
    if(!v.type)v.type="project";
    if(v.customName===undefined)v.customName="";
  });
  return s;
}

/* ---------- save + GitHub auto-sync ---------- */
let syncTimer=null;
let syncStatus="idle";

function save(){
  try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){toast("Couldn't save — storage blocked");}
  githubSyncDebounced();
}
function githubSyncDebounced(){
  clearTimeout(syncTimer);
  setSyncStatus("syncing");
  syncTimer=setTimeout(githubSync,1500);
}
async function githubSync(){
  const token=localStorage.getItem(GHKEY);
  if(!token){setSyncStatus("idle");return;}
  try{
    const headers={"Authorization":"token "+token,"Content-Type":"application/json","Accept":"application/vnd.github+json"};
    // get current SHA so we can update (not create) the file
    let sha=null;
    const getR=await fetch("https://api.github.com/repos/"+REPO+"/contents/"+DATA_PATH+"?ref="+BRANCH,{headers});
    if(getR.ok){const f=await getR.json();sha=f.sha;}
    // encode state as base64 (handles UTF-8 correctly)
    const json=JSON.stringify(state,null,2);
    const encoded=btoa(unescape(encodeURIComponent(json)));
    const body={message:"Auto-save "+new Date().toISOString().slice(0,16).replace("T"," ") + " IST",content:encoded,branch:BRANCH};
    if(sha)body.sha=sha;
    const putR=await fetch("https://api.github.com/repos/"+REPO+"/contents/"+DATA_PATH,{method:"PUT",headers,body:JSON.stringify(body)});
    if(!putR.ok){const err=await putR.json();throw new Error(err.message||putR.status);}
    setSyncStatus("ok");
    toast("Synced to GitHub ✓");
  }catch(e){
    setSyncStatus("error");
    console.error("GitHub sync error:",e);
  }
}
function setSyncStatus(s){
  syncStatus=s;
  const pill=document.getElementById("syncPill");if(!pill)return;
  const dot=pill.querySelector(".sp-dot");
  const lbl=pill.querySelector(".sp-lbl");
  const map={idle:{t:"Not connected",c:"var(--sidebar-muted)"},syncing:{t:"Syncing…",c:"var(--amber)"},ok:{t:"Synced ✓",c:"#52c27b"},error:{t:"Sync error ⚠",c:"#e87070"}};
  const m=map[s]||map.idle;
  dot.style.background=m.c;lbl.textContent=m.t;lbl.style.color=m.c;
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

/* ---------- seed sample data ---------- */
function seed(){

    {id:"p2",name:"Kohima Govt School",customer:"Edu. Dept",site:"Kohima Village, Kohima",capacityKw:10,discom:"DoPN — Feeder KHM-11",status:"todo",start:d(5),end:d(22),notes:"Rooftop survey pending"},

    {id:"rep2",type:"repair",projectId:"",customName:"Kohima Residence — panel cleaning",site:"Kohima Town",date:d(3),mode:"crew",crewName:"",crewStart:"09:00",crewEnd:"11:00",assignments:[{personId:"t3"}],notes:"Scheduled quarterly clean",completed:false,workDone:"",remarks:""}
  ];
  return {projects:p,people:ppl,visits:v};
}

/* ---------- date helpers ---------- */
function iso(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function parse(s){if(!s)return null;const[a,b,c]=s.split("-").map(Number);return new Date(a,b-1,c);}
function todayISO(){return iso(new Date());}
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DOWL=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtD(s){const d=parse(s);return d?d.getDate()+" "+MON[d.getMonth()]:"";}
function fmtFull(s){const d=parse(s);return d?DOW[d.getDay()]+", "+d.getDate()+" "+MON[d.getMonth()]+" "+d.getFullYear():"";}
function daysBetween(a,b){return Math.round((parse(b)-parse(a))/86400000);}
function addDays(s,n){const d=parse(s);d.setDate(d.getDate()+n);return iso(d);}
function startOfWeek(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
function dur(a,b){if(!a||!b)return"";const[h1,m1]=a.split(":").map(Number);const[h2,m2]=b.split(":").map(Number);let m=(h2*60+m2)-(h1*60+m1);if(m<0)m+=1440;const h=Math.floor(m/60),mm=m%60;return h+"h"+(mm?" "+mm+"m":"");}
function initials(n){return n.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join("").toUpperCase();}

/* ---------- mode ---------- */
let editMode=false;
function applyMode(){
  document.getElementById("app").classList.toggle("view-only",!editMode);
  const b=document.getElementById("modeBtn");
  b.className="mode-pill "+(editMode?"mode-edit":"mode-view");
  document.getElementById("modeLabel").textContent=editMode?"Edit mode":"View only";
  document.getElementById("modeHint").textContent=editMode?"Tap to lock":"Tap to edit";
  render();
}
function toggleMode(){
  if(editMode){editMode=false;applyMode();return;}
  const pin=localStorage.getItem(PINKEY);
  if(pin){const a=prompt("Enter edit PIN");if(a===null)return;if(a!==pin){toast("Wrong PIN");return;}}
  editMode=true;applyMode();
}

/* ---------- projects ---------- */
const STATUS={todo:{label:"To do",cls:"b-todo",sw:"#8A938F"},doing:{label:"Doing",cls:"b-doing",sw:"#F2A516"},done:{label:"Done",cls:"b-done",sw:"#1E8A53"}};
const REPAIR_COLOR="#C0392B";
function proj(id){return state.projects.find(p=>p.id===id);}
function person(id){return state.people.find(p=>p.id===id);}
function reportsFor(pid){return state.visits.filter(v=>v.completed&&v.type==="project"&&v.projectId===pid);}
function projLastActivity(p){const rs=reportsFor(p.id);if(!rs.length)return null;return rs.reduce((m,v)=>v.date>m?v.date:m,rs[0].date);}
function projProgress(p){
  if(p.progressManual!=null&&p.progressManual!=="")return Math.max(0,Math.min(100,+p.progressManual));
  if(p.status==="done")return 100;
  if(p.status==="doing"&&p.start&&p.end){const span=daysBetween(p.start,p.end);const e=daysBetween(p.start,todayISO());return Math.max(6,Math.min(96,Math.round(e/Math.max(1,span)*100)));}
  return 0;
}
function visitDisplayName(v){
  if(v.type==="repair")return v.customName||"Repair / Maintenance";
  const p=proj(v.projectId);
  if(p)return p.name;
  if(v.customName)return v.customName;
  return "(deleted project)";
}
function visitBadgeColor(v){return v.type==="repair"?REPAIR_COLOR:(proj(v.projectId)?STATUS[proj(v.projectId).status].sw:"#8A938F");}
let calReportMonth=startOfMonth(new Date());
let calReportDay="";
let reportFilter="all";
let reportTypeFilter="all";

/* ---------- routing ---------- */
const PAGES=[
  {id:"overview",label:"Overview",ic:'<path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>'},
  {id:"projects",label:"Projects",ic:'<path d="M4 4h16v4H4zM4 10h16v4H4zM4 16h10v4H4z"/>'},
  {id:"timeline",label:"Timeline",ic:'<path d="M3 5h12v3H3zM3 10.5h16v3H3zM3 16h9v3H3z"/>'},
  {id:"schedule",label:"Schedule",ic:'<path d="M7 2v3M17 2v3M3 8h18M5 5h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V6a1 1 0 011-1z" fill="none" stroke="currentColor" stroke-width="2"/>'},
  {id:"reports",label:"Daily reports",ic:'<path d="M7 3h8l4 4v13a1 1 0 01-1 1H7a1 1 0 01-1-1V4a1 1 0 011-1z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M9 12l1.5 1.5L13 11M9 16h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'},
  {id:"people",label:"People",ic:'<path d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-4 0-8 2-8 5v1h16v-1c0-3-4-5-8-5z"/>'},
  {id:"settings",label:"Settings",ic:'<path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" fill="none" stroke="currentColor" stroke-width="2"/>'}
];
let page="overview";
function buildNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML="";
  PAGES.forEach(p=>{
    if(p.id==="settings"){
      const sep=document.createElement("div");
      sep.style.cssText="height:1px;background:rgba(255,255,255,.07);margin:6px 8px 4px";
      nav.appendChild(sep);
    }
    const b=document.createElement("button");
    b.className=p.id===page?"on":"";
    b.innerHTML=`<svg class="ic" viewBox="0 0 24 24" fill="currentColor">${p.ic}</svg>${p.label}`;
    b.onclick=()=>{page=p.id;document.getElementById("side").classList.remove("open");buildNav();render();};
    nav.appendChild(b);
  });
}

/* ---------- render ---------- */
function render(){
  const pg=PAGES.find(p=>p.id===page)||PAGES[0];
  document.getElementById("pageTitle").textContent=pg.label;
  document.getElementById("todayLabel").textContent=page==="settings"?"":fmtFull(todayISO());
  const c=document.getElementById("content");
  const act=document.getElementById("pageActions");
  act.innerHTML="";
  c.innerHTML="";
  if(page==="overview")renderOverview(c);
  else if(page==="projects"){addAction(act,"+ Project",()=>openProject());renderProjects(c);}
  else if(page==="timeline")renderTimeline(c,act);
  else if(page==="schedule"){addAction(act,"+ Site visit",()=>openVisit());renderSchedule(c,act);}
  else if(page==="reports"){addAction(act,"+ New report",()=>openVisit(null,true));renderReports(c,act);}
  else if(page==="people"){addAction(act,"+ Person",()=>openPerson());renderPeople(c);}
  else if(page==="settings")renderSettings(c);
}
function addAction(host,label,fn){
  const b=document.createElement("button");
  b.className="btn amber";b.textContent=label;b.setAttribute("data-edit","");b.onclick=fn;
  host.appendChild(b);
}

/* ---------- SETTINGS ---------- */
function renderSettings(c){
  const token=localStorage.getItem(GHKEY)||"";
  c.innerHTML=`
  <div class="settings-card">
    <div class="sc-head">GitHub Auto-Sync</div>
    <div class="sc-body">
      <p>Every change you save is written to GitHub automatically. Claude reads your live data from there. Enter your token once below — you never need to touch it again.</p>
      <div class="field">
        <label>Personal Access Token</label>
        <input id="gh_token" type="password" value="${attr(token)}" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
        <div style="font-size:12px;color:var(--muted);margin-top:7px;line-height:1.6">
          Create one at <b>github.com → Settings → Developer settings → Personal access tokens (classic) → Generate new token</b>.
          Tick the <b>repo</b> scope (or just <b>public_repo</b> if this repo is public). Copy the token here.
        </div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button class="btn primary" onclick="saveGHToken()">Save &amp; connect</button>
        ${token?`<button class="btn" style="color:var(--danger);border-color:#e8c8c4" onclick="clearGHToken()">Remove token</button>`:""}
        <span id="gh_status" style="font-size:13px"></span>
      </div>
    </div>
  </div>
  ${token?`<div class="settings-card">
    <div class="sc-head">Where Claude reads your data</div>
    <div class="sc-body">
      <p>After each save, your data is available at this URL. Claude in Mission Control fetches it automatically.</p>
      <code>https://raw.githubusercontent.com/${REPO}/${BRANCH}/${DATA_PATH}</code>
      <div style="margin-top:10px">
        <button class="btn sm" onclick="githubSync();toast('Syncing now…')">Force sync now</button>
      </div>
    </div>
  </div>`:""}`;
}
function saveGHToken(){
  const t=document.getElementById("gh_token").value.trim();
  if(!t){toast("Enter a token first");return;}
  localStorage.setItem(GHKEY,t);
  const el=document.getElementById("gh_status");
  if(el){el.textContent="Testing…";el.style.color="var(--muted)";}
  testGHToken(t);
}
async function testGHToken(t){
  try{
    const r=await fetch("https://api.github.com/repos/"+REPO,{headers:{"Authorization":"token "+t,"Accept":"application/vnd.github+json"}});
    if(r.ok){
      const el=document.getElementById("gh_status");
      if(el){el.textContent="✓ Connected!";el.style.color="var(--green)";}
      setSyncStatus("ok");
      toast("Connected ✓ — syncing now…");
      await githubSync();
      render(); // refresh settings to show data URL section
    }else{
      const err=await r.json();
      throw new Error(err.message||r.status);
    }
  }catch(e){
    const el=document.getElementById("gh_status");
    if(el){el.textContent="⚠ Failed: "+e.message;el.style.color="var(--danger)";}
    setSyncStatus("error");
  }
}
function clearGHToken(){
  if(!confirm("Remove token? Auto-sync will stop."))return;
  localStorage.removeItem(GHKEY);
  setSyncStatus("idle");
  render();
  toast("Token removed");
}

/* ---------- OVERVIEW ---------- */
function renderOverview(c){
  const t=todayISO();
  const active=state.projects.filter(p=>p.status!=="done");
  const onSiteToday=state.visits.filter(v=>v.date===t);
  const wkStart=iso(startOfWeek(new Date()));
  const wkEnd=addDays(wkStart,6);
  const wkVisits=state.visits.filter(v=>v.date>=wkStart&&v.date<=wkEnd);
  const totKw=state.projects.reduce((s,p)=>s+(+p.capacityKw||0),0);
  const doneKw=state.projects.filter(p=>p.status==="done").reduce((s,p)=>s+(+p.capacityKw||0),0);
  const pct=totKw?Math.round(doneKw/totKw*100):0;
  c.innerHTML=`
  <div class="kpis">
    <div class="kpi"><div class="lab">Active projects</div><div class="num">${active.length}</div><div class="foot">${state.projects.length} total · ${state.projects.filter(p=>p.status==="doing").length} in progress</div></div>
    <div class="kpi"><div class="lab">On site today</div><div class="num">${onSiteToday.length}<small> ${onSiteToday.length===1?"visit":"visits"}</small></div><div class="foot">${peopleToday(onSiteToday)} people deployed</div></div>
    <div class="kpi"><div class="lab">Visits this week</div><div class="num">${wkVisits.length}</div><div class="foot">${fmtD(wkStart)} – ${fmtD(wkEnd)}</div></div>
    <div class="kpi"><div class="lab">Capacity commissioned</div><div class="num">${doneKw}<small> / ${totKw} kWp</small></div><div class="bar-accent"><i style="width:${pct}%"></i></div></div>
  </div>
  <div class="two-col">
    <div class="panel"><div class="ph"><h3>On site today</h3><span class="read-only-tag">${fmtFull(t)}</span></div><div class="pb" id="ov-today"></div></div>
    <div class="panel"><div class="ph"><h3>Coming up this week</h3></div><div class="pb" id="ov-upcoming"></div></div>
  </div>`;
  const tEl=c.querySelector("#ov-today");

function visitRange(v){

function startOfMonth(d){return new Date(d.getFullYear(),d.getMonth(),1);}

function renderGantt(c){
  const ps=state.projects.filter(p=>p.start&&p.end).slice().sort((a,b)=>a.start.localeCompare(b.start));
  if(!ps.length){c.innerHTML=`<div class="panel"><div class="pb"><div class="empty">No projects with dates yet.<br><b>Add a project</b> with start and end dates to see the Gantt.</div></div></div>`;return;}
  let min=ps[0].start,max=ps[0].end;
  ps.forEach(p=>{if(p.start<min)min=p.start;if(p.end>max)max=p.end;});
  state.visits.forEach(v=>{if(v.date<min)min=v.date;if(v.date>max)max=v.date;});
  min=addDays(min,-2);max=addDays(max,2);
  const total=daysBetween(min,max)+1;
  const dayW=Math.max(20,Math.min(40,Math.floor(900/total)));
  const axisW=total*dayW;
  let months="";let cur=parse(min);
  while(iso(cur)<=max){
    const first=(cur.getDate()===1)||iso(cur)===min;
    if(first){const off=daysBetween(min,iso(cur))*dayW;months+=`<div class="g-month" style="left:${off}px">${MON[cur.getMonth()]} ${String(cur.getFullYear()).slice(2)}</div>`;}
    cur.setDate(cur.getDate()+1);
  }
  const todayOff=(todayISO()>=min&&todayISO()<=max)?daysBetween(min,todayISO())*dayW+dayW/2:-1;
  let rows="";
  ps.forEach(p=>{
    const left=daysBetween(min,p.start)*dayW;const w=(daysBetween(p.start,p.end)+1)*dayW;
    const pins=state.visits.filter(v=>v.projectId===p.id).map(v=>{
      const off=daysBetween(min,v.date)*dayW+dayW/2;
      return `<div class="g-pin" style="left:${off}px;background:${STATUS[p.status].sw}" title="${esc(v.site)} ${visitRange(v)}" data-vid="${v.id}"></div>`;
    }).join("");
    rows+=`<div class="g-row"><div class="g-rl"><span class="nm">${esc(p.name)}</span><span class="st">${p.capacityKw||"?"} kWp · ${STATUS[p.status].label}</span></div>
      <div class="g-track" style="width:${axisW}px">
        <div class="g-bar" style="left:${left}px;width:${w}px;background:${STATUS[p.status].sw}" data-pid="${p.id}">${fmtD(p.start)}–${fmtD(p.end)}</div>
        ${pins}${todayOff>=0?`<div class="g-today" style="left:${todayOff}px"></div>`:""}
      </div></div>`;
  });
  const repairs=state.visits.filter(v=>v.type==="repair"&&v.date>=min&&v.date<=max);
  if(repairs.length){
    const rpins=repairs.map(v=>{const off=daysBetween(min,v.date)*dayW+dayW/2;return `<div class="g-pin" style="left:${off}px;background:${REPAIR_COLOR};border-color:#fff" title="${esc(visitDisplayName(v))}" data-vid="${v.id}"></div>`;}).join("");
    rows+=`<div class="g-row"><div class="g-rl"><span class="nm" style="color:${REPAIR_COLOR}">Repairs & Maintenance</span><span class="st">${repairs.length} event${repairs.length!==1?"s":""}</span></div>
      <div class="g-track" style="width:${axisW}px">${rpins}${todayOff>=0?`<div class="g-today" style="left:${todayOff}px"></div>`:""}</div></div>`;
  }
  c.innerHTML=`<div class="panel"><div class="gantt-wrap"><div class="gantt">
    <div class="g-head"><div class="g-left">Project</div><div class="g-axis" style="width:${axisW}px">${months}</div></div>
    ${rows}
  </div></div></div>`;
  c.querySelectorAll(".g-bar").forEach(b=>b.onclick=()=>openProject(b.dataset.pid));
  c.querySelectorAll(".g-pin").forEach(b=>b.onclick=()=>openVisit(b.dataset.vid));
}

    const vs=state.visits.filter(v=>v.date===ds).sort(byTime);

  wireCal(c,()=>{calWeek=new Date(start.getTime()-7*864e5);},()=>{calWeek=new Date(start.getTime()+7*864e5);},()=>{calWeek=startOfWeek(new Date());});

function saveVisit(id){
  const g=x=>{const e=document.getElementById(x);return e?e.value:"";};
  const prev=id?state.visits.find(v=>v.id===id):null;const prevPid=prev?prev.projectId:null;
  const rawProj=vType==="project"?g("v_proj"):"";const isCustomProj=rawProj==="__custom__";
  const o={id:id||uid(),type:vType,
    projectId:vType==="project"&&!isCustomProj?rawProj:"",
    customName:vType==="repair"?g("v_customname").trim():(isCustomProj?g("v_customname").trim():""),
    site:g("v_site").trim(),date:g("v_date"),mode:curVMode,notes:g("v_notes").trim(),completed:vCompleted};
  if(curVMode==="crew"){o.crewName=g("v_crewname").trim();o.crewStart=g("v_cs");o.crewEnd=g("v_ce");o.assignments=draftAssign.map(a=>({personId:a.personId}));}
  else{o.crewName="";o.crewStart="";o.crewEnd="";o.assignments=draftAssign.filter(a=>a.personId).map(a=>({personId:a.personId,start:a.start,end:a.end}));}
  if(o.completed){o.workDone=g("v_workdone").trim();o.remarks=g("v_remarks").trim();o.progress=(vType==="repair"||isCustomProj)?"":g("v_progress");}
  else{o.workDone="";o.remarks="";o.progress="";}
  if(!o.date){toast("Date required");return;}
  if(vType==="project"&&!isCustomProj&&!o.projectId){toast("Select a project");return;}
  if(vType==="project"&&isCustomProj&&!o.customName){toast("Enter a custom project name");return;}
  if(vType==="repair"&&!o.customName){toast("Enter a job / repair name");return;}
  if(id){const idx=state.visits.findIndex(v=>v.id===id);if(idx>=0)state.visits[idx]=o;else state.visits.push(o);}else state.visits.push(o);
  if(o.completed&&o.type==="project"&&o.projectId){const pr=proj(o.projectId);if(pr&&pr.status==="todo")pr.status="doing";}
  if(o.type==="project"&&o.projectId){recalcProjectProgress(o.projectId);if(prevPid&&prevPid!==o.projectId)recalcProjectProgress(prevPid);}
  save();closeModal();
  if(o.completed&&page!=="reports"){page="reports";buildNav();}
  render();toast(o.completed?"Report saved":(id?"Saved":"Created"));
}
function recalcProjectProgress(pid){
  const pr=proj(pid);if(!pr)return;
  const reps=reportsFor(pid).filter(v=>v.progress!=null&&v.progress!=="");
  if(!reps.length){delete pr.progressManual;return;}
  reps.sort((a,b)=>a.date.localeCompare(b.date)||cmpTime(a,b));
  pr.progressManual=+reps[reps.length-1].progress;
}
function delVisit(id){
  const v=state.visits.find(x=>x.id===id);if(!confirm("Delete this entry?"))return;
  const pid=v?v.projectId:null;state.visits=state.visits.filter(x=>x.id!==id);
  if(pid)recalcProjectProgress(pid);save();closeModal();render();toast("Deleted");
}

document.getElementById("exportBtn").onclick=()=>{

document.getElementById("importBtn").onclick=()=>{if(!editMode){toast("Switch to Edit mode to restore");return;}document.getElementById("fileInput").click();};
document.getElementById("fileInput").onchange=e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.projects||!d.visits||!d.people)throw 0;
    if(!confirm("Restore from backup? This replaces all current data."))return;
    state=d;save();render();toast("Data restored");}catch(err){toast("Invalid backup file");}};
  r.readAsText(f);e.target.value="";
};
document.getElementById("pinBtn").onclick=()=>{
  const cur=localStorage.getItem(PINKEY);
  if(cur){if(!editMode){toast("Switch to Edit mode to change PIN");return;}
    const a=prompt("Current PIN (blank to remove)");if(a===null)return;
    if(a!==cur){toast("Wrong PIN");return;}
    const n=prompt("New PIN (blank to remove lock)","");if(n)localStorage.setItem(PINKEY,n);else{localStorage.removeItem(PINKEY);toast("PIN removed");return;}

  <!-- =======================================================================
     SGE Solar Ops — multi-device live sync fix  (paste before </body>)

     Fixes the "schedule made on one device disappears" problem.

     Cause: every device overwrites the WHOLE data file when it saves. A
     device that's been sitting open with an old copy will overwrite the
     newer data pushed from your other device. Whoever saves last wins.

     This block makes every open device pull the latest data:
        • on load,
        • whenever you switch back to it (focus / tab becomes visible),
        • and every 15 seconds while open,
     so a device is never holding a stale copy when it saves. It NEVER
     refreshes while a dialog is open or while a save is in progress, so it
     can't wipe something you're typing.

     Also shows "Synced ✓" on load when a token is saved on that device.

     INSTALL: remove any earlier sync block you pasted, then paste THIS one
     just before </body> and save / push. Put your token in Settings on each
     device you want to edit from. Golden rule still applies: edit on one
     device at a time and let it reach "Synced ✓".
     ======================================================================= -->
<script>
(function () {
  "use strict";
  var GHKEY = "sge_gh_token";
  var KEY   = "sge_solar_ops_v1";
  var DATA_URL = "https://raw.githubusercontent.com/ilongjamir/SGE-Dashboard/main/data.json";
  var POLL_MS = 15000;
  var pulling = false, lastApplied = "";

  // Don't refresh while the user is mid-edit or a save is still in flight.
  function busy() {
    var s = document.getElementById("scrim");
    if (s && s.classList.contains("open")) return true;          // a dialog is open
    try { if (typeof syncStatus !== "undefined" && syncStatus === "syncing") return true; } catch (e) {}
    return false;
  }

  function applyRemote(remote) {
    if (!remote || !Array.isArray(remote.projects)) return;
    var next = (typeof migrate === "function") ? migrate(remote) : remote;
    var nextStr = JSON.stringify(next);
    if (nextStr === lastApplied) return;   // remote hasn't changed since last apply
    if (busy()) return;                    // never clobber an in-progress / unsynced edit
    lastApplied = nextStr;
    state = next;
    try { localStorage.setItem(KEY, nextStr); } catch (e) {}   // cache only — no push
    if (typeof buildNav === "function") buildNav();
    if (typeof render === "function") render();
  }

  function pull() {
    if (pulling || busy()) return;
    pulling = true;
    fetch(DATA_URL + "?t=" + Date.now(), { cache: "no-store" })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (remote) { pulling = false; applyRemote(remote); })
      .catch(function () { pulling = false; });   // offline — keep what's shown
  }

  document.addEventListener("DOMContentLoaded", function () {
    if (localStorage.getItem(GHKEY)) {
      try { if (typeof setSyncStatus === "function") setSyncStatus("ok"); } catch (e) {}
    }
    pull();
  });
  document.addEventListener("visibilitychange", function () { if (!document.hidden) pull(); });
  window.addEventListener("focus", pull);
  setInterval(pull, POLL_MS);
})();
</script>
